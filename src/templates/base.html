<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MealMap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand-block">
        <div class="brand-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>
        </div>
        <div class="brand-text">
          <h1>MealMap</h1>
          <p class="subtitle">Find recipes that match your nutrition goals. &middot; <span style="opacity:0.6;">CS 4300</span></p>
        </div>
      </div>
      <div class="topbar-right">
        <div id="metaPills" class="meta-pills"></div>
        <button id="mealPlanBtn" class="meal-plan-btn" type="button">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
          Meal Plan
          <span id="planBadge" class="plan-badge hidden">0</span>
        </button>
      </div>
    </header>

    <main class="layout">
      <section class="panel search-panel">
        <div class="search-card">
          <label class="section-label" for="searchInput">Search for a dish</label>
          <div class="search-autocomplete-wrap">
            <div class="search-row">
              <input id="searchInput" type="text" placeholder="ex. yummy taco options" autocomplete="off" />
              <button id="searchButton" type="button">Search</button>
            </div>
            <div id="matchDropdown" class="match-dropdown hidden"></div>
          </div>

          <div class="model-toggle-row">
            <label class="toggle-label">
              <input id="showListingDropdown" type="checkbox" checked />
              Show match suggestions while typing
            </label>
          </div>

          <div id="modelOptionsWrap" class="model-select-wrap">
            <label class="section-label" for="modelSelect">Search method</label>
            <select id="modelSelect" class="model-select">
              <option value="tfidf">TF-IDF — keyword search</option>
              <option value="svd">SVD — semantic search</option>
            </select>
          </div>

          <div class="filters-header">
            <div>
              <p class="filters-title">Nutrition goal</p>
              <p class="filters-subtitle">Pick one to re-rank results.</p>
            </div>
            <button id="clearFiltersButton" class="ghost-btn" type="button">Clear</button>
          </div>

          <div id="nutrientFilters" class="filters">
            <button class="filter-btn" data-diet="high_protein">High Protein</button>
            <button class="filter-btn" data-diet="low_carb">Low Carb</button>
            <button class="filter-btn" data-diet="keto">Keto</button>
            <button class="filter-btn" data-diet="low_calorie">Low Calorie</button>
            <button class="filter-btn" data-diet="low_fat">Low Fat</button>
            <button class="filter-btn" data-diet="low_sodium">Low Sodium</button>
            <button class="filter-btn" data-diet="balanced">Balanced</button>
            <button class="filter-btn" data-diet="bodybuilding">Bodybuilding</button>
          </div>

          <div id="queryBreakdown" class="query-breakdown" aria-live="polite">
            <div class="query-breakdown-header">
              <h3 class="query-breakdown-title">Query breakdown</h3>
              <span id="queryBreakdownBadge" class="qb-badge" title="SVD components fitted on the corpus">—</span>
            </div>
            <div id="queryBreakdownBody" class="query-breakdown-body hidden">
              <div class="latent-card">
                <p class="latent-kicker">Latent dimensions</p>
                <div class="radar-wrap">
                  <div id="queryRadarMount" class="radar-mount" aria-label="Query topic radar"></div>
                </div>
              </div>
              <ul id="queryDimsList" class="axis-def-list"></ul>
              <p id="queryBreakdownExplain" class="qb-explain"></p>
            </div>
            <p id="queryBreakdownEmpty" class="qb-empty">Run a search to see which terms influenced the ranking!</p>
          </div>
        </div>
      </section>

      <section class="panel results-panel">
        <div class="results-header">
          <div>
            <p class="section-label">Results</p>
            <h2 id="resultsTitle">Search to get started</h2>
          </div>
          <div id="activeState" class="active-state"></div>
        </div>

        <div id="statusMessage" class="status"></div>

        <section id="llmAnswerPanel" hidden>
          <div class="results-card">
            <h3>LLM Response:</h3>
            <div id="llmAnswerText"></div>
            <div id="ragMeta" class="meta-row"></div>
          </div>
        </section>
        <div id="recipesGrid" class="grid"></div>
      </section>
    </main>
  </div>

  <!-- Recipe modal -->
  <div id="recipeModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content">
      <button id="closeModalButton" class="close-modal" aria-label="Close">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- Meal plan drawer -->
  <div id="mealPlanDrawer" class="drawer hidden" aria-hidden="true">
    <div class="drawer-backdrop" id="drawerBackdrop"></div>
    <div class="drawer-panel">
      <div class="drawer-header">
        <div id="drawerTitle">
          <h2>Meal Plan</h2>
          <p id="drawerSubtitle" class="drawer-subtitle"></p>
        </div>
        <button id="closeDrawerBtn" class="close-drawer" aria-label="Close">&times;</button>
      </div>
      <div id="drawerBody" class="drawer-body"></div>
      <div id="drawerFooter" class="drawer-footer"></div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
