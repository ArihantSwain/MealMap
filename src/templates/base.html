<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MealMap</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>MealMap</h1>
      <p>Search recipes and filter by dietary preference.</p>

      <div class="search-row">
        <input id="searchInput" type="text" placeholder="Search for a recipe..." />
        <button id="searchButton">Search</button>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-diet="">All</button>
        <button class="filter-btn" data-diet="vegetarian">Vegetarian</button>
        <button class="filter-btn" data-diet="vegan">Vegan</button>
        <button class="filter-btn" data-diet="gluten-free">Gluten Free</button>
        <button class="filter-btn" data-diet="high-protein">High Protein</button>
        <button class="filter-btn" data-diet="keto">Keto</button>
      </div>
    </header>

    <main>
      <div id="statusMessage" class="status"></div>
      <div id="recipesGrid" class="grid"></div>
    </main>
  </div>

  <div id="recipeModal" class="modal hidden">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content">
      <button id="closeModalButton" class="close-modal" aria-label="Close modal">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
