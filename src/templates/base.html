<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MealMap</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>MealMap</h1>
      <p>Search a food, choose the closest match, then filter by nutrient goal.</p>

      <div class="search-row">
        <input id="searchInput" type="text" placeholder="Search for a food..." />
        <button id="searchButton">Search</button>
      </div>

      <div id="nutrientFilters" class="filters hidden">
        <button class="filter-btn" data-diet="high_protein">High Protein</button>
        <button class="filter-btn" data-diet="low_carb">Low Carb</button>
        <button class="filter-btn" data-diet="keto">Keto</button>
        <button class="filter-btn" data-diet="low_calorie">Low Calorie</button>
        <button class="filter-btn" data-diet="low_fat">Low Fat</button>
        <button class="filter-btn" data-diet="low_sodium">Low Sodium</button>
        <button class="filter-btn" data-diet="balanced">Balanced</button>
        <button class="filter-btn" data-diet="bodybuilding">Bodybuilding</button>
      </div>
    </header>

    <main>
      <div id="statusMessage" class="status"></div>
      <div id="recipesGrid" class="grid"></div>
    </main>
  </div>

  <div id="recipeModal" class="modal hidden">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content">
      <button id="closeModalButton" class="close-modal" aria-label="Close modal">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
